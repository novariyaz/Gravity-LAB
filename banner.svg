<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000508"/>
      <stop offset="100%" style="stop-color:#010e1a"/>
    </linearGradient>

    <!-- Plasma glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip -->
    <clipPath id="clip"><rect width="900" height="200"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- BG -->
    <rect width="900" height="200" fill="url(#bg)"/>

    <!-- Grid lines horizontal -->
    <line x1="0" y1="40" x2="900" y2="40" stroke="rgba(0,255,231,0.04)" stroke-width="1"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="rgba(0,255,231,0.04)" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="rgba(0,255,231,0.04)" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="rgba(0,255,231,0.04)" stroke-width="1"/>

    <!-- Grid lines vertical -->
    <line x1="90" y1="0" x2="90" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="270" y1="0" x2="270" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="630" y1="0" x2="630" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>
    <line x1="810" y1="0" x2="810" y2="200" stroke="rgba(0,255,231,0.03)" stroke-width="1"/>

    <!-- Nebula blobs -->
    <circle cx="120" cy="80" r="140" fill="rgba(0,255,231,0.025)">
      <animate attributeName="r" values="140;160;140" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="130" r="120" fill="rgba(123,47,255,0.025)">
      <animate attributeName="r" values="120;140;120" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Stars -->
    <circle cx="50" cy="20" r="1" fill="rgba(200,230,255,0.8)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="15" r="1.2" fill="rgba(200,230,255,0.9)"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="25" r="0.8" fill="rgba(200,230,255,0.7)"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="18" r="1" fill="rgba(200,230,255,0.8)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.9s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="12" r="1.3" fill="rgba(200,230,255,0.9)"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="850" cy="30" r="0.9" fill="rgba(200,230,255,0.6)"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.3s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="185" r="1" fill="rgba(200,230,255,0.7)"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="190" r="1.1" fill="rgba(200,230,255,0.8)"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="180" r="0.8" fill="rgba(200,230,255,0.6)"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="170" r="1" fill="rgba(200,230,255,0.7)"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" repeatCount="indefinite"/></circle>

    <!-- Gravity orb (left) -->
    <g transform="translate(80, 100)">
      <!-- Field rings -->
      <circle cx="0" cy="0" r="55" fill="none" stroke="rgba(0,255,231,0.06)" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="42" fill="none" stroke="rgba(0,255,231,0.08)" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="28" fill="none" stroke="rgba(0,255,231,0.1)" stroke-width="1">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
      </circle>
      <!-- Glow -->
      <circle cx="0" cy="0" r="20" fill="rgba(0,255,231,0.15)">
        <animate attributeName="r" values="18;22;18" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.15;0.25;0.15" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Core -->
      <circle cx="0" cy="0" r="10" fill="rgba(0,255,231,0.9)" filter="url(#glow2)">
        <animate attributeName="r" values="9;11;9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Orbiting dot -->
      <circle cx="0" cy="-42" r="3" fill="#00ffe7" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="28" r="2" fill="#ff4500" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Corner decorations -->
    <rect x="0" y="0" width="60" height="1" fill="rgba(0,255,231,0.4)"/>
    <rect x="0" y="0" width="1" height="60" fill="rgba(0,255,231,0.4)"/>
    <rect x="840" y="0" width="60" height="1" fill="rgba(0,255,231,0.4)"/>
    <rect x="899" y="0" width="1" height="60" fill="rgba(0,255,231,0.4)"/>
    <rect x="0" y="199" width="60" height="1" fill="rgba(0,255,231,0.4)"/>
    <rect x="0" y="140" width="1" height="60" fill="rgba(0,255,231,0.4)"/>
    <rect x="840" y="199" width="60" height="1" fill="rgba(0,255,231,0.4)"/>
    <rect x="899" y="140" width="1" height="60" fill="rgba(0,255,231,0.4)"/>

    <!-- Scan line sweep -->
    <rect x="0" y="0" width="900" height="2" fill="rgba(0,255,231,0.04)">
      <animateTransform attributeName="transform" type="translate" from="0,0" to="0,200" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- MAIN TITLE -->
    <text x="450" y="95" font-family="'Courier New', monospace" font-size="62" font-weight="900"
      text-anchor="middle" letter-spacing="12" fill="none" stroke="#00ffe7" stroke-width="1.5" filter="url(#glow2)">
      GRAVITY LAB
      <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
    </text>
    <!-- Glitch layer 1 -->
    <text x="452" y="95" font-family="'Courier New', monospace" font-size="62" font-weight="900"
      text-anchor="middle" letter-spacing="12" fill="#ff4500" opacity="0.3">
      GRAVITY LAB
      <animate attributeName="x" values="452;449;453;452" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0.3;0;0;0" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="clip-path" values="" dur="5s" repeatCount="indefinite"/>
    </text>
    <!-- Glitch layer 2 -->
    <text x="448" y="95" font-family="'Courier New', monospace" font-size="62" font-weight="900"
      text-anchor="middle" letter-spacing="12" fill="#7b2fff" opacity="0">
      GRAVITY LAB
      <animate attributeName="x" values="448;451;447;448" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0;0.25;0;0" dur="7s" repeatCount="indefinite"/>
    </text>

    <!-- Subtitle -->
    <text x="450" y="130" font-family="'Courier New', monospace" font-size="13"
      text-anchor="middle" letter-spacing="6" fill="rgba(0,255,231,0.5)">
      INTERACTIVE GRAVITATIONAL FIELD EXPLORER
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite"/>
    </text>

    <!-- Eyebrow tag -->
    <text x="450" y="62" font-family="'Courier New', monospace" font-size="10"
      text-anchor="middle" letter-spacing="4" fill="rgba(0,255,231,0.3)">
      // v3.0 · BUILT WITH HTML · CSS · JAVASCRIPT · CANVAS API
    </text>

    <!-- Bottom ticker line -->
    <line x1="160" y1="155" x2="740" y2="155" stroke="rgba(0,255,231,0.1)" stroke-width="1"/>
    <text x="450" y="170" font-family="'Courier New', monospace" font-size="9"
      text-anchor="middle" letter-spacing="3" fill="rgba(0,255,231,0.25)">
      g(φ,h) = 9.780327(1 + 0.0053024sin²φ) · (1 − 2h/R)
    </text>

    <!-- Pulsing dots bottom -->
    <circle cx="200" cy="185" r="2" fill="rgba(0,255,231,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="185" r="2" fill="rgba(0,255,231,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="185" r="2" fill="rgba(0,255,231,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="680" cy="185" r="2" fill="rgba(255,69,0,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="690" cy="185" r="2" fill="rgba(255,69,0,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="185" r="2" fill="rgba(255,69,0,0.4)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
